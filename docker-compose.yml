services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aegis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aegis_dev_password_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-aegis}
    ports:
    - 5432:5432
    volumes:
    - postgres_data:/var/lib/postgresql/data
    - ./deploy/postgres/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    - ./deploy/postgres/01-keycloak-db.sql:/docker-entrypoint-initdb.d/01-keycloak-db.sql:ro
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U ${POSTGRES_USER:-aegis} -d ${POSTGRES_DB:-aegis}
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped
  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    command:
    - start
    - --import-realm
    - --optimized=false
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER:-aegis}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-aegis_dev_password_change_me}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin_change_me}
      KC_HOSTNAME_STRICT: 'false'
      KC_HTTP_ENABLED: 'true'
      KC_PROXY_HEADERS: xforwarded
      KC_HEALTH_ENABLED: 'true'
    ports:
    - 8081:8080
    volumes:
    - ./deploy/keycloak/realm-aegis.json:/opt/keycloak/data/import/realm-aegis.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # Process-level liveness check. The earlier /dev/tcp/ probe failed
      # silently in this image's UBI base (bash builtin disabled). pgrep
      # is shipped in the Keycloak UBI base. Combined with start_period
      # this gives the JVM ~90 seconds to boot before dependents start
      # their OIDC discovery loops.
      test: ["CMD", "pgrep", "-f", "quarkus"]
      interval: 30s
      timeout: 5s
      retries: 6
      start_period: 90s
    restart: unless-stopped
  opa:
    image: openpolicyagent/opa:0.70.0
    command:
    - run
    - --server
    - --addr
    - 0.0.0.0:8181
    ports:
    - 8181:8181
    restart: unless-stopped
  vault:
    image: hashicorp/vault:1.17
    cap_add:
    - IPC_LOCK
    command:
    - server
    - -dev
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN:-root-dev-token-change-me}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://127.0.0.1:8200
    ports:
    - 8200:8200
    healthcheck:
      test:
      - CMD-SHELL
      - vault status -address=http://127.0.0.1:8200 >/dev/null 2>&1 || exit 1
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 5s
    restart: unless-stopped
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    command:
    - --config=/etc/otelcol/config.yaml
    volumes:
    - ./deploy/otel/collector.yaml:/etc/otelcol/config.yaml:ro
    ports:
    - 4317:4317
    - 4318:4318
    - 8889:8889
    depends_on:
    - jaeger
    restart: unless-stopped
  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
    ports:
    - 16686:16686
    - 14250:14250
    restart: unless-stopped
  runtime-cell-image:
    image: aegis-runtime-cell:latest
    build:
      context: .
      dockerfile: Dockerfile.runtime-cell
    command:
    - 'true'
    restart: 'no'
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      OIDC_ISSUER: ${OIDC_ISSUER:-http://keycloak:8080/realms/aegis}
      OIDC_PUBLIC_ISSUER: ${OIDC_PUBLIC_ISSUER:-http://localhost:8081/realms/aegis}
      OPA_URL: http://opa:8181
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN:-root-dev-token-change-me}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      DATABASE_URL: postgresql://${POSTGRES_USER:-aegis}:${POSTGRES_PASSWORD:-aegis_dev_password_change_me}@postgres:5432/${POSTGRES_DB:-aegis}
      AEGIS_ENV: ${AEGIS_ENV:-development}
      AEGIS_ADMIN_TOKEN: ${AEGIS_ADMIN_TOKEN:-change-me-admin-token}
      AEGIS_LOCAL_MASTER_KEY: ${AEGIS_LOCAL_MASTER_KEY:-change-me-local-master-key-32bytes}
      AEGIS_AUDIT_KEY: ${AEGIS_AUDIT_KEY:-}
      AEGIS_SECRET_BACKEND: ${AEGIS_SECRET_BACKEND:-env}
      AEGIS_SECRET_ENV_FALLBACK: ${AEGIS_SECRET_ENV_FALLBACK:-true}
      AEGIS_SKILL_SIGNING_KEY: ${AEGIS_SKILL_SIGNING_KEY:-demo-skill-signing-key}
      AEGIS_CORS_ORIGINS: ${AEGIS_CORS_ORIGINS:-http://localhost:5173}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin_change_me}
      AEGIS_KC_ADMIN_BASE: http://keycloak:8080
      AEGIS_KC_REALM: ${KEYCLOAK_REALM:-aegis}
      AEGIS_KC_PUBLIC_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-aegis-cli}
      AEGIS_RATE_LIMIT_BACKEND: ${AEGIS_RATE_LIMIT_BACKEND:-redis}
      AEGIS_REDIS_URL: redis://:${REDIS_PASSWORD:-redis_dev_password_change_me}@redis:6379/0
      AEGIS_MONGO_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME:-aegis}:${MONGO_INITDB_ROOT_PASSWORD:-mongo_dev_password_change_me}@mongo:27017/?authSource=admin
      AEGIS_SKILL_PUBLIC_KEY: ${AEGIS_SKILL_PUBLIC_KEY:-Ms5VAI+2S9EJZZSGcV/EPwAyvpx/RGbRELjcIrfgGc8=}
      AEGIS_EMBED_ENABLED: ${AEGIS_EMBED_ENABLED:-false}
      AEGIS_EMBED_BASE: ${AEGIS_EMBED_BASE:-http://host.docker.internal:11434}
      AEGIS_EMBED_MODEL: ${AEGIS_EMBED_MODEL:-nomic-embed-text}
      AEGIS_EXPORT_ENABLED: ${AEGIS_EXPORT_ENABLED:-true}
      AEGIS_EXPORT_PATH: /app/exports/seed-state.sql
      AEGIS_EXPORT_INTERVAL: ${AEGIS_EXPORT_INTERVAL:-15}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AEGIS_DEFAULT_MODEL: ${AEGIS_DEFAULT_MODEL:-openai/gpt-4.1}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      NVIDIA_BASE_URL: ${NVIDIA_BASE_URL:-}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
    ports:
    - 8080:8080
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock
    - ./configs:/app/configs:ro
    - ./deploy:/app/deploy:ro
    - ./exports:/app/exports
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        # Was service_healthy — switched to service_started so api isn't
        # blocked by Keycloak healthcheck flakes. The api already retries
        # OIDC discovery with backoff on its own, so this is the right
        # boundary: wait for keycloak's container to START, not to be
        # marked healthy by Docker's probe.
        condition: service_started
      opa:
        condition: service_started
      vault:
        condition: service_started
      runtime-cell-image:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    security_opt:
    - no-new-privileges:true
    restart: unless-stopped
  redis:
    image: redis:7-alpine
    command:
    - sh
    - -c
    - redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_dev_password_change_me}
    ports:
    - 6379:6379
    healthcheck:
      test:
      - CMD-SHELL
      - redis-cli -a "$${REDIS_PASSWORD}" ping | grep -q PONG
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-aegis}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-mongo_dev_password_change_me}
    ports:
    - 27017:27017
    volumes:
    - mongo_data:/data/db
    healthcheck:
      test:
      - CMD
      - mongosh
      - --quiet
      - -u
      - ${MONGO_INITDB_ROOT_USERNAME:-aegis}
      - -p
      - ${MONGO_INITDB_ROOT_PASSWORD:-mongo_dev_password_change_me}
      - --authenticationDatabase
      - admin
      - --eval
      - db.adminCommand('ping')
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
    - 5173:80
    environment:
      VITE_API_BASE: ${VITE_API_BASE:-/api}
      VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:-/auth}
      VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM:-aegis}
      VITE_KEYCLOAK_CLIENT: ${VITE_KEYCLOAK_CLIENT:-aegis-cli}
    depends_on:
    - api
    - keycloak
    restart: unless-stopped
volumes:
  postgres_data: null
  mongo_data: null
