name: ci
on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Unit tests
        run: pytest -q
      - name: Validate configs
        run: |
          python - <<'PY'
          import yaml, json, pathlib
          for p in pathlib.Path('configs').rglob('*.yaml'):
              yaml.safe_load(p.read_text())
          for p in pathlib.Path('deploy').rglob('*.json'):
              json.loads(p.read_text())
          print('config validation ok')
          PY

  policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install OPA
        run: |
          curl -L -o /usr/local/bin/opa https://openpolicyagent.org/downloads/v0.70.0/opa_linux_amd64_static
          chmod +x /usr/local/bin/opa
      - name: OPA policy tests
        run: opa test deploy/opa -v

  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f Dockerfile.api -t sentinel-api:ci .
