    body: 'Architecture Proposal v2 — Sidecar PDP

      Architecture Proposal v2 — Sidecar PDP

      Owner: ravi.officer.synthetic@example-co.test

      Audience: research + compliance leads only.

      Proposal

      We propose colocating an OPA sidecar on every workload pod. Per-pod LRU decision cache; signed

      capability bundles distributed via the CDN with per-tenant sharding. Cache key includes (subject,

      capability_version, action_signature, resource_signature, values_version, grant_version). Sensitive action

      classes bypass the cache.

      Risks

      Bundle churn could overwhelm cache invalidation paths. Mitigation: lint+simulation pipeline before promotion.

      '
